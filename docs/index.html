<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Log Viewer</title>
    <link rel="stylesheet" href="./styles.css?v=51.5" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-topline">
          <p class="eyebrow">GitHub Pages</p>
          <p id="versionBadge" class="version-badge">v—</p>
        </div>
        <h1>Trading Log Viewer</h1>
      </header>

      <section class="panel bundle-panel">
        <div>
          <p class="bundle-label">Committed `10k` snapshots</p>
          <p class="muted">
            The running bot publishes fresh copies of the runtime log, decision log,
            and trade journal into this site.
          </p>
        </div>
        <div class="bundle-actions">
          <button id="reloadBundled" class="button button-secondary" type="button">Reload committed snapshots</button>
        </div>
      </section>

      <section class="panel tab-panel">
        <div class="tablist" role="tablist" aria-label="Trading log tabs">
          <button class="tab-button is-active" data-tab="botlog" type="button" role="tab" aria-selected="true">Runtime Log</button>
          <button class="tab-button" data-tab="decisions" type="button" role="tab" aria-selected="false">Decision Log</button>
          <button class="tab-button" data-tab="trades" type="button" role="tab" aria-selected="false">Trade Journal</button>
          <button class="tab-button" data-tab="portfolio" type="button" role="tab" aria-selected="false">Last Portfolio</button>
        </div>
      </section>

      <section class="panel controls">
        <div class="controls-head">
          <div>
            <p class="controls-kicker">Filters</p>
            <h2 class="controls-title">Narrow The Current View</h2>
          </div>
        </div>
        <div class="control">
          <label for="assetFilter">Asset</label>
          <select id="assetFilter">
            <option value="">All assets</option>
          </select>
        </div>
        <div class="control control-search">
          <label for="textFilter">Text search</label>
          <input id="textFilter" type="text" placeholder="rebalance, Capitol, error, target" />
        </div>
        <div class="control">
          <label for="limitInput">Show latest</label>
          <input id="limitInput" type="number" min="1" step="1" value="120" />
        </div>
        <div class="control control-action">
          <label class="button-label" for="applyFilters">Run filters</label>
          <button id="applyFilters" class="button" type="button">Apply Filters</button>
        </div>
      </section>

      <section id="summaryPanel" class="summary-grid"></section>

      <section id="resultsPanel" class="panel empty-state">
        <h2>Loading</h2>
        <p>Fetching the latest committed snapshots.</p>
      </section>
    </main>

    <template id="summaryCardTemplate">
      <article class="summary-card">
        <p class="summary-label"></p>
        <p class="summary-value"></p>
      </article>
    </template>

    <script src="./app.js?v=51.5"></script>
  </body>
</html>
